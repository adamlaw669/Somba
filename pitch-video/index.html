<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SOMBA — The Film</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- letterbox viewport -->
  <div id="viewport">
    <!-- fixed 1920x1080 design space, scaled to fit -->
    <div id="stage">
      <!-- scenes injected by video.js -->
      <div id="scenes"></div>
      <!-- transition fx layer sits above scenes -->
      <div id="fx"></div>
      <!-- persistent grain + vignette -->
      <div id="grain"></div>
      <div id="vignette"></div>
    </div>
  </div>

  <!-- start overlay (also unlocks audio) -->
  <div id="gate">
    <div class="gate-inner">
      <div class="gate-mark">
        <span class="gate-glyph">&#8358;</span>
      </div>
      <h1 class="gate-title">SOMBA<span class="blink">_</span></h1>
      <p class="gate-sub">THE FILM &mdash; recurring billing &amp; recovery, built for how Nigerians actually pay</p>
      <button id="btn-start">
        <span class="tri"></span> PLAY FILM
      </button>
      <p class="gate-hint">3 min 26 s &middot; sound on &middot; best fullscreen (F)</p>
    </div>
  </div>

  <!-- control bar -->
  <div id="controls" class="hidden">
    <button id="btn-play" title="play / pause (space)"><span class="ico-pause"></span></button>
    <div id="scrub">
      <div id="scrub-fill"></div>
      <div id="scrub-markers"></div>
    </div>
    <span id="timecode" class="mono">0:00</span>
    <button id="btn-mute" title="music on/off (m)">&#9835;</button>
    <button id="btn-full" title="fullscreen (f)">&#x26F6;</button>
  </div>

  <script src="./assets/anime.min.js"></script>
  <script src="./music.js"></script>
  <script src="./video.js"></script>
</body>
</html>
