services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      # Two listeners: 'internal' for clients inside Docker (the app container),
      # 'external' for clients on the host machine (your dev scripts/tests).
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      # What each listener tells clients to reconnect on. Must be reachable
      # from where that client runs: 'redpanda' resolves only inside Docker;
      # 'localhost' is how your Mac reaches the mapped port.
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      PORT: ${PORT:-8000}
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - redpanda
    restart: unless-stopped

volumes:
  redpanda-data:
