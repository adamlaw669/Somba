services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      # Two listeners: 'internal' for clients inside Docker (the app container),
      # 'external' for clients on the host machine (your dev scripts/tests).
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      # What each listener tells clients to reconnect on. Must be reachable
      # from where that client runs: 'redpanda' resolves only inside Docker;
      # 'localhost' is how your Mac reaches the mapped port.
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      # Hardcoded and NOT ${PORT:-8000}: env_file above already loads PORT from
      # .env (used below to choose the *host*-side published port). Without this
      # override that same value leaks into the container too, so uvicorn binds
      # to e.g. 8001 while compose still forwards host:8001 -> container:8000 —
      # a silent port mismatch. The container must always listen on 8000; only
      # the host-side publish port is configurable.
      PORT: "8000"
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - redpanda
    restart: unless-stopped

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
    # Drives billing sweep -> charge execution, webhook delivery, reconciliation,
    # and the alert ticks (somba/scheduler/runner.py). Without this service
    # nothing ever charges a subscription or delivers a webhook — the API
    # alone only handles inbound requests. Re-runs migrations on start (same
    # as `app`) since alembic upgrade is idempotent and this may start first.
    command: ["sh", "-c", "alembic upgrade head && python -m somba.scheduler.runner"]
    depends_on:
      - redpanda
    restart: unless-stopped

volumes:
  redpanda-data:
